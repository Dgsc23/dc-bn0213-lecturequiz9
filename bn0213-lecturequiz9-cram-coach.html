var COACH_SYS="You are a sharp biochemistry tutor for BN0213 Lecture Quiz 9 (Dr. Basso), Module 11: Cholesterol, Bile Acids, and Lipoproteins. Teach ONLY what Basso taught. Key points: cholesterol = four fused steroid rings (A-D), a precursor to steroid hormones/bile acids/vitamin D and a membrane component; HMG-CoA reductase is the rate-limiting enzyme of cholesterol synthesis and the statin target (HMG-CoA synthase is needed but NOT rate-limiting); SREBP regulates synthesis and up-regulates LDL receptors, lowering plasma LDL; CYP7A1 (7-alpha-hydroxylase) is the rate-limiting enzyme for bile-acid synthesis and is feedback-inhibited by bile acids; unconjugated bile acids = chenodeoxycholic + cholic, conjugated = add glycine or taurine (glycocholic/taurocholic); lipoproteins = chylomicron (apoB-48, made in intestine), VLDL/LDL (apoB-100), apoC-II activates LPL, apoE for remnant uptake; HDL does reverse cholesterol transport (want it high), LDL delivers cholesterol (atherosclerosis), but cholesterol is essential not simply bad; vitamin D is made by UVB (not red light). Do NOT quiz the detailed mevalonate/synthesis steps or structures (Basso said not to memorize them). Be concise, quiz back, and do not invent facts.";

function extractText(data){
  try{ if(typeof data==='string') return data;
    if(data.content&&Array.isArray(data.content)) return data.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n');
    if(data.completion) return data.completion;
    if(data.choices&&data.choices[0]) return data.choices[0].message?data.choices[0].message.content:data.choices[0].text;

<script id="cram-media-js">
/* Self-contained media layer: one Dr. Basso recording -> 🎧 audio play-from-here,
   🎬 draggable video pop-out, 🖼️ slide lightbox. Mirrors the lecture MC drill. */
(function(){
  if(window.__cramMediaReady) return; window.__cramMediaReady=true;
  var VID=MEDIA_VID, AUD=MEDIA_AUD;
  function mmss(s){ s=Math.max(0,Math.floor(s)); return Math.floor(s/60)+':'+('0'+(s%60)).slice(-2); }

  /* ---------- shared audio element ---------- */
  function getAudio(){
    var a=document.getElementById('cram-aud');
    if(!a){ a=document.createElement('audio'); a.id='cram-aud'; a.preload='none'; a.setAttribute('playsinline',''); document.body.appendChild(a); }
    return a;
  }

  /* ---------- 🎧 floating audio bar (play from here) ---------- */
  function buildAudioBar(){
    var bar=document.getElementById('cram-audiobar');
    if(bar) return bar;
    bar=document.createElement('div'); bar.id='cram-audiobar';
    bar.innerHTML=
       '<div class="cab-top"><span class="cab-ts" id="cram-aud-ts">0:00</span>'
      +'<span class="cab-title" id="cram-aud-label">Dr. Basso — Cholesterol lecture</span>'
      +'<button class="cab-x" title="Close" onclick="window.cramAudClose()">✕</button></div>'
      +'<div class="cab-ctl">'
      +'<button class="cab-b" title="Back 10 seconds" onclick="window.cramAudSkip(-10)">« 10s</button>'
      +'<button class="cab-b cab-play" id="cram-aud-play" title="Play / pause" onclick="window.cramAudToggle()">⏸</button>'
      +'<button class="cab-b" title="Forward 10 seconds" onclick="window.cramAudSkip(10)">10s »</button>'
      +'<button class="cab-b" title="Slower" onclick="window.cramAudRate(-0.25)">−</button>'
      +'<span class="cab-rate" id="cram-aud-rate">1.0×</span>'
      +'<button class="cab-b" title="Faster (to 3×)" onclick="window.cramAudRate(0.25)">+</button>'
      +'</div>';
    document.body.appendChild(bar);
    var a=getAudio();
    a.addEventListener('timeupdate',function(){ var t=document.getElementById('cram-aud-ts'); if(t)t.textContent=mmss(a.currentTime); });
    a.addEventListener('play',function(){ var p=document.getElementById('cram-aud-play'); if(p)p.textContent='⏸'; });
    a.addEventListener('pause',function(){ var p=document.getElementById('cram-aud-play'); if(p)p.textContent='▶'; });
    return bar;
  }
  window.cramAudioPlay=function(sec,label){
    if(window.cramVideoPause) window.cramVideoPause();   /* never double audio */
    var bar=buildAudioBar(); var a=getAudio();
    var lab=document.getElementById('cram-aud-label'); if(lab)lab.textContent=label||'Dr. Basso — Cholesterol lecture';
    var tb=document.getElementById('cram-aud-ts'); if(tb)tb.textContent=mmss(sec);
    bar.style.display='flex';
    if(a.getAttribute('src')!==AUD){ a.setAttribute('src',AUD); try{a.load();}catch(e){} }
    var go=function(){ try{a.currentTime=Math.max(0,sec);}catch(e){} var p=a.play(); if(p&&p.catch)p.catch(function(){}); };
    if(a.readyState>=1){ go(); } else { a.addEventListener('loadedmetadata',go,{once:true}); a.addEventListener('canplay',go,{once:true}); try{a.load();}catch(e){} }
  };
  window.cramAudToggle=function(){ var a=getAudio(); if(a.paused){ var p=a.play(); if(p&&p.catch)p.catch(function(){}); } else { a.pause(); } };
  window.cramAudSkip=function(s){ var a=getAudio(); a.currentTime=Math.max(0,(a.currentTime||0)+s); if(a.paused){ var p=a.play(); if(p&&p.catch)p.catch(function(){}); } };
  window.cramAudRate=function(d){ var a=getAudio(); var r=Math.min(3,Math.max(0.5,(a.playbackRate||1)+d)); a.playbackRate=r; var el=document.getElementById('cram-aud-rate'); if(el)el.textContent=r.toFixed(1)+'×'; };
  window.cramAudClose=function(){ var a=getAudio(); try{a.pause();}catch(e){} var bar=document.getElementById('cram-audiobar'); if(bar)bar.style.display='none'; };
  window.cramAudioPause=function(){ var a=document.getElementById('cram-aud'); if(a){ try{a.pause();}catch(e){} } };

  /* ---------- 🎬 draggable video pop-out ---------- */
  function buildVidPop(){
    var pop=document.getElementById('cram-vidpop');
    if(pop) return pop;
    pop=document.createElement('div'); pop.id='cram-vidpop';
    pop.innerHTML=
       '<div class="cvp-head"><span>🎬 LECTURE VIDEO</span>'
      +'<span class="cvp-title" id="cram-vid-title">Dr. Basso — Lecture</span>'
      +'<button class="cvp-min" id="cram-vid-min" title="Minimize (keeps playing)" onclick="window.cramVidMin()">🗕</button>'
      +'<button class="cvp-close" title="Close" onclick="window.cramVideoClose()">✕</button></div>'
      +'<div class="cvp-row"><button class="cvp-b" onclick="window.cramVidSkip(-30)">« 30s</button><button class="cvp-b" onclick="window.cramVidSkip(-10)">« 10s</button><button class="cvp-b" onclick="window.cramVidSkip(10)">10s »</button><button class="cvp-b" onclick="window.cramVidSkip(30)">30s »</button></div>'
      +'<div class="cvp-row"><button class="cvp-b" onclick="window.cramVidRate(-0.25)">− 0.25</button><span class="cvp-rate" id="cram-vid-rate">1.00×</span><button class="cvp-b" onclick="window.cramVidRate(0.25)">+ 0.25</button></div>'
      +'<video id="cram-vid-el" controls preload="none" playsinline controlslist="nodownload"></video>';
    document.body.appendChild(pop);
    initVidDrag(pop);
    return pop;
  }
  window.cramVideoOpen=function(sec,label){
    if(window.cramAudioPause) window.cramAudioPause();   /* never double audio */
    var pop=buildVidPop(); var v=document.getElementById('cram-vid-el');
    var titleEl=document.getElementById('cram-vid-title'); if(titleEl)titleEl.textContent=(label||'Dr. Basso — Lecture')+' · '+mmss(sec);
    pop.classList.remove('min'); pop.classList.add('show');
    var minb=document.getElementById('cram-vid-min'); if(minb)minb.textContent='🗕';
    if(v.getAttribute('src')!==VID){ v.setAttribute('src',VID); try{v.load();}catch(e){} }
    var go=function(){ try{v.currentTime=Math.max(0,sec);}catch(e){} var p=v.play(); if(p&&p.catch)p.catch(function(){}); };
    if(v.readyState>=1){ go(); } else { v.addEventListener('loadedmetadata',go,{once:true}); try{v.load();}catch(e){} }
  };
  window.cramVidMin=function(){ var pop=document.getElementById('cram-vidpop'); if(!pop)return; var m=pop.classList.toggle('min'); var b=document.getElementById('cram-vid-min'); if(b){ b.textContent=m?'🗖':'🗕'; b.title=m?'Restore':'Minimize (keeps playing)'; } };
  window.cramVidSkip=function(s){ var v=document.getElementById('cram-vid-el'); if(v)v.currentTime=Math.max(0,(v.currentTime||0)+s); };
  window.cramVidRate=function(d){ var v=document.getElementById('cram-vid-el'); if(!v)return; var r=Math.min(3,Math.max(0.25,(v.playbackRate||1)+d)); v.playbackRate=r; var el=document.getElementById('cram-vid-rate'); if(el)el.textContent=r.toFixed(2)+'×'; };
  window.cramVideoClose=function(){ var pop=document.getElementById('cram-vidpop'); if(!pop)return; var v=document.getElementById('cram-vid-el'); if(v){try{v.pause();}catch(e){}} pop.classList.remove('show'); };
  window.cramVideoPause=function(){ var v=document.getElementById('cram-vid-el'); if(v){try{v.pause();}catch(e){}} };
  function initVidDrag(pop){
    var head=pop.querySelector('.cvp-head'); if(!head)return;
    var drag=false,sx=0,sy=0,sl=0,st=0;
    function down(e){ if(e.target&&e.target.closest&&e.target.closest('button'))return; var t=(e.touches&&e.touches[0])?e.touches[0]:e; drag=true; var r=pop.getBoundingClientRect(); sx=t.clientX; sy=t.clientY; sl=r.left; st=r.top; pop.style.right='auto'; pop.style.bottom='auto'; pop.style.left=sl+'px'; pop.style.top=st+'px'; if(e.cancelable)e.preventDefault(); }
    function move(e){ if(!drag)return; var t=(e.touches&&e.touches[0])?e.touches[0]:e; var nl=Math.max(0,Math.min(window.innerWidth-pop.offsetWidth,sl+t.clientX-sx)); var nt=Math.max(0,Math.min(window.innerHeight-pop.offsetHeight,st+t.clientY-sy)); pop.style.left=nl+'px'; pop.style.top=nt+'px'; if(e.cancelable)e.preventDefault(); }
    function up(){ drag=false; }
    head.addEventListener('mousedown',down); document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
    head.addEventListener('touchstart',down,{passive:false}); document.addEventListener('touchmove',move,{passive:false}); document.addEventListener('touchend',up);
  }

  /* ---------- 🖼️ slide lightbox ---------- */
  function buildLightbox(){
    var lb=document.getElementById('cram-lightbox');
    if(lb) return lb;
    lb=document.createElement('div'); lb.id='cram-lightbox';
    lb.innerHTML=
       '<button class="clb-x" onclick="window.cramSlideClose()">✕ Close</button>'
      +'<div class="clb-inner"><div class="clb-scroll"><img id="cram-lb-img" alt="Lecture slide"/></div>'
      +'<div class="clb-bar"><span id="cram-lb-cap">Slide</span><span style="opacity:.6">· click image to zoom · Esc to close</span></div></div>';
    document.body.appendChild(lb);

    var img=lb.querySelector('#cram-lb-img');
    img.addEventListener('click',function(){ lb.classList.toggle('zoom'); });
    return lb;
  }
  window.cramSlideOpen=function(slide,label){
    var lb=buildLightbox(); lb.classList.remove('zoom');
    var img=document.getElementById('cram-lb-img'); if(img)img.setAttribute('src',slide);
    var cap=document.getElementById('cram-lb-cap'); if(cap)cap.textContent=(label||'Slide')+' · '+String(slide).split('/').pop();
    lb.classList.add('show');
  };
  window.cramSlideClose=function(){ var lb=document.getElementById('cram-lightbox'); if(lb){ lb.classList.remove('show'); lb.classList.remove('zoom'); } };

  document.addEventListener('keydown',function(e){ if(e.key==='Escape') window.cramSlideClose(); });
})();
</script>

  background: #334155; color: #94a3b8; border: 1px solid #475569;
  width: 32px; height: 36px; border-radius: 8px; cursor: pointer;
  font-size: 16px; line-height: 1; padding: 0; font-weight: 600;
  flex-shrink: 0;
}
.fab-ai-mini-close:hover { background: #475569; color: #f87171; border-color: #ef4444; }
.fab-ai-followup textarea {
  flex: 1; background: #0f172a; color: #e2e8f0;
  border: 1px solid #334155; border-radius: 8px;
  padding: 8px 10px; font-size: 13px; font-family: inherit;
  resize: none; min-height: 36px; max-height: 120px;
}
.fab-ai-followup textarea:focus { outline: none; border-color: #818cf8; }
.fab-ai-followup button {
  background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
  border: none; padding: 0 14px; border-radius: 8px; font-weight: 600;
  cursor: pointer; font-size: 13px; white-space: nowrap;
}
.fab-ai-followup button:hover { transform: translateY(-1px); }
.fab-ai-followup button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
<script id="fab-ai-companion-js">
(function(){
  const ENDPOINT = "https://fab-ai.dgync1.workers.dev";
  const CLASS_NAME = "BN0213"; // e.g., "CP1" / "FAB101" / "GA0102" — empty = generic chiropractic tutor
  let panel = null;
  let history = []; // [{role:'user'|'model', content}]
  let currentQKey = null; // to detect Q navigation

  function readCurrentQ() {
    const qText = (document.querySelector('.q-text')?.innerText || '').replace(/^Q\d+(\s+of\s+\d+)?:\s*/, '');
    const optBtns = Array.from(document.querySelectorAll('.opt-btn'));
    const options = optBtns.map(b => {
      const clone = b.cloneNode(true);
      clone.querySelectorAll('.rationale').forEach(r => r.remove());
      clone.querySelectorAll('.letter').forEach(r => r.remove());
      return clone.innerText.trim();
    });
    let picked = null, correct = null;
    optBtns.forEach((b, i) => {
      if (b.classList.contains('picked-correct') || b.classList.contains('picked-wrong')) picked = i;
      if (b.classList.contains('picked-correct') || b.classList.contains('show-correct')) correct = i;
    });
    const profTip = document.querySelector('.prof-tip')?.innerText?.replace(/^Professor:\s*/i, '').trim() || '';
    const source = document.querySelector('.source-line')?.innerText?.replace(/^Source:\s*/i, '').trim() || '';
    const quote = document.querySelector('.quote-line')?.innerText?.trim() || '';
    return { question: qText, options, picked, correct, profTip, source, quote };
  }

  function qKey(ctx){ return (ctx.question || '') + '|' + (ctx.options || []).join('|'); }

  function mdToHtml(md){
    let html = md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|\n)### (.+)/g, '$1<h3>$2</h3>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*?<\/li>(\s*<li>.*?<\/li>)*)/gs, '<ul>$1</ul>');
    html = html.split(/\n{2,}/).map(p => {
      if (p.trim().startsWith('<ul') || p.trim().startsWith('<h3')) return p;
      if (p.trim() === '') return '';
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
    return html;
  }

  function stripForTts(text){
    // Remove markdown markers so TTS doesn't read them aloud
    return text
      .replace(/\*\*/g, '')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/^\s*[-*]\s+/gm, '')
      .replace(/^#+\s+/gm, '')
      .replace(/\n{2,}/g, '. ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  let currentUtter = null;
  function speakToggle(btn, rawText){
    if (!window.speechSynthesis) {
      alert('Your browser does not support text-to-speech.');
      return;
    }
    if (window.speechSynthesis.speaking && currentUtter && btn.classList.contains('playing')) {
      window.speechSynthesis.cancel();
      document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
        b.classList.remove('playing');
        b.innerHTML = '🔊 Read';
      });
      currentUtter = null;
      return;
    }
    window.speechSynthesis.cancel();
    document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
      b.classList.remove('playing');
      b.innerHTML = '🔊 Read';
    });
    const u = new SpeechSynthesisUtterance(stripForTts(rawText));
    const rateSel = btn.parentElement.querySelector('.fab-ai-tts-rate');
    u.rate = parseFloat(rateSel && rateSel.value || '1.0');
    /*ava-tts*/try{var _vs=(window.speechSynthesis&&window.speechSynthesis.getVoices())||[];var _av=_vs.find(function(v){return /microsoft.*ava.*natural/i.test(v.name);})||_vs.find(function(v){return /microsoft.*emma.*natural/i.test(v.name);})||_vs.find(function(v){return /google us english female/i.test(v.name);});if(_av){u.voice=_av;u.lang=_av.lang||'en-US';}}catch(e){}
    u.onend = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    u.onerror = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    currentUtter = u;
    btn.classList.add('playing');
    btn.innerHTML = '⏹ Stop';
    window.speechSynthesis.speak(u);
  }

  function appendMsg(role, text) {
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ' + role;
    const bub = document.createElement('div');
    bub.className = 'fab-ai-bubble';
    if (role === 'ai') {
      bub.innerHTML = mdToHtml(text);
      // Add TTS row
      const row = document.createElement('div');
      row.className = 'fab-ai-tts-row';
      const btn = document.createElement('button');
      btn.className = 'fab-ai-tts-btn';
      btn.innerHTML = '🔊 Read';
      btn.onclick = function(){ speakToggle(btn, text); };
      const rate = document.createElement('select');
      rate.className = 'fab-ai-tts-rate';
      rate.title = 'Reading speed';
      ['0.8','1.0','1.2','1.5','2.0'].forEach(function(r){
        const o = document.createElement('option');
        o.value = r; o.textContent = r + 'x';
        if (r === '1.0') o.selected = true;
        rate.appendChild(o);
      });
      row.appendChild(btn);
      row.appendChild(rate);
      bub.appendChild(row);
    } else {
      bub.textContent = text;
    }
    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return bub;
  }

  function appendLoading(){
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ai';
    wrap.id = 'fabAiLoading';
    const bub = document.createElement('div');
    bub.className = 'fab-ai-bubble';
    bub.innerHTML = '<div class="fab-ai-loading"><div class="fab-ai-spinner"></div> Thinking...</div>';
    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return wrap;
  }

  function removeLoading(){
    const el = document.getElementById('fabAiLoading');
    if (el) el.remove();
  }

  function appendStatus(text, isErr){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    const div = document.createElement('div');
    div.className = 'fab-ai-status' + (isErr ? ' err' : '');
    div.innerHTML = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }

  function renderSuggestions(ctx){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    // Q preview at top
    if (ctx.question) {
      const qp = document.createElement('div');
      qp.className = 'fab-ai-qpreview';
      qp.innerHTML = '<b>Q:</b> ' + ctx.question.substring(0, 240) + (ctx.question.length > 240 ? '...' : '');
      body.appendChild(qp);
    }
    // Suggestion chips
    const sug = document.createElement('div');
    sug.className = 'fab-ai-suggestions';
    const chips = [];
    if (ctx.picked === null || ctx.picked === undefined) {
      chips.push({ label: '💡 Give me a hint', q: 'Give me a hint for this question without revealing the answer.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the core concept this question is testing.' });
    } else if (ctx.picked !== ctx.correct && ctx.picked !== null) {
      chips.push({ label: '❌ Why did I miss this?', q: 'I picked the wrong answer. Walk me through why my pick is wrong and why the correct answer is right.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the concept this question is testing in simpler terms.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    } else if (ctx.picked === ctx.correct) {
      chips.push({ label: '✅ Why is this right?', q: 'Confirm why the correct answer is right and flag any trap distractors to watch for.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    }
    chips.push({ label: '🌟 Use an analogy', q: 'Explain this with a dumbed-down analogy.' });
    chips.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'fab-ai-sug';
      btn.textContent = c.label;
      btn.onclick = () => sendMessage(c.q);
      sug.appendChild(btn);
    });
    body.appendChild(sug);
  }

  function clearChat(preserveCtx){
    const body = document.getElementById('fabAiBody');
    if (body) body.innerHTML = '';
    history = [];
    if (preserveCtx) {
      const ctx = readCurrentQ();
      renderSuggestions(ctx);
    }
  }

  function openPanel() {
    if (!panel) panel = buildPanel();
    panel.classList.add('open');
    const ctx = readCurrentQ();
    const key = qKey(ctx);
    if (key !== currentQKey) {
      // Q changed — reset chat and show suggestions for new Q
      currentQKey = key;
      clearChat(true);
    }
  }

  function buildPanel() {
    const el = document.createElement('div');
    el.className = 'fab-ai-panel';
    el.innerHTML = '<div class="fab-ai-header">'
      + '<h3>🩺 Study Tutor</h3>'
      + '<button class="fab-ai-hdr-btn" onclick="fabAiClear()">Clear</button>'
      + '<button class="fab-ai-close" onclick="fabAiClose()">×</button>'
      + '</div>'
      + '<div class="fab-ai-body" id="fabAiBody"></div>'
      + '<div class="fab-ai-followup">'
      + '<button class="fab-ai-mini-close" title="Close panel" onclick="fabAiClose()">×</button>'
      + '<textarea id="fabAiFollowup" placeholder="Ask a question about this Q..." rows="1" onkeydown="if(event.keyCode===13&&!event.shiftKey){event.preventDefault();fabAiFollowupSend();}"></textarea>'
      + '<button onclick="fabAiFollowupSend()">Send</button>'
      + '</div>';
    document.body.appendChild(el);
    return el;
  }

  window.fabAiClose = function(){ if(panel) panel.classList.remove('open'); };
  window.fabAiClear = function(){ clearChat(true); };

  async function callWorker(payload) {
    if (!ENDPOINT) return { clipboardFallback: true };
    try {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
      return { reply: data.reply };
    } catch (e) {
      return { error: String(e.message || e) };
    }
  }

  function clipboardFallback(ctx, userQ) {
    const letter = (i) => String.fromCharCode(65 + i);
    let prompt = "I'm studying FAB 101 with Dr. Bui at SCUHS. Drill question:\n\n";
    prompt += 'Q: ' + ctx.question + '\n\n';
    if (ctx.options && ctx.options.length) {
      ctx.options.forEach((o, i) => {
        const m = [];
        if (i === ctx.picked) m.push('PICKED');
        if (i === ctx.correct) m.push('CORRECT');
        prompt += letter(i) + '. ' + o + (m.length ? ' ('+m.join(', ')+')' : '') + '\n';
      });
      prompt += '\n';
    }
    if (ctx.profTip) prompt += 'DRILL TIP: ' + ctx.profTip + '\n\n';
    if (userQ) prompt += 'MY QUESTION: ' + userQ + '\n\n';
    prompt += 'Explain using a dumbed-down analogy + mnemonic.';
    navigator.clipboard.writeText(prompt).then(() => {
      appendStatus('✓ Prompt copied to clipboard. Ask the Study Tutor (the 🩺 button).');
    }).catch(() => {
      appendStatus('Could not copy. Please select manually.', true);
    });
  }

  async function sendMessage(userText) {
    const ctx = readCurrentQ();
    currentQKey = qKey(ctx);
    appendMsg('user', userText);
    history.push({ role: 'user', content: userText });
    appendLoading();

    const payload = Object.assign({}, ctx, {
      userQuestion: userText,
      history: history.slice(-10), // last 10 turns for context
      className: CLASS_NAME, // worker uses this to load class-specific knowledge
    });
    const result = await callWorker(payload);
    removeLoading();
    if (result.clipboardFallback) {
      clipboardFallback(ctx, userText);
      return;
    }
    if (result.error) {
      appendStatus('Error: ' + result.error, true);
      return;
    }
    appendMsg('ai', result.reply);
    history.push({ role: 'model', content: result.reply });
  }

  window.fabAiFollowupSend = function() {
    const ta = document.getElementById('fabAiFollowup');
    const q = (ta && ta.value || '').trim();
    if (!q) return;
    ta.value = '';
    sendMessage(q);
  };

  // Button install — opens panel, does NOT auto-call AI
  function install() {
    if (document.getElementById('fabAiBtn')) return;
    const btn = document.createElement('button');
    btn.className = 'fab-ai-btn';
    btn.id = 'fabAiBtn';
    btn.textContent = '🩺';
    btn.title = 'Open AI Study Tutor';
    btn.onclick = () => openPanel();
    document.body.appendChild(btn);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', install);
  } else {
    install();
  }
})();
</script>
